# ------------------------------------------------------------------
# CI/CD Pipeline: Build, Push to ECR, Deploy to ECS Fargate,
# and Upsert the SageMaker Pipeline.
#
# Triggers on push to the main branch.
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID      - IAM user access key
#   AWS_SECRET_ACCESS_KEY  - IAM user secret key
#   AWS_REGION             - AWS region (eu-north-1)
#   AWS_ACCOUNT_ID         - 12-digit AWS account ID
# ------------------------------------------------------------------

name: Deploy ML Platform

on:
  push:
    branches:
      - main

env:
  ECR_REPOSITORY: tabular-ml-platform-app
  ECS_CLUSTER: tabular-ml-platform-cluster
  ECS_SERVICE: tabular-ml-platform-service
  PIPELINE_NAME: tabular-ml-platform-pipeline
  IMAGE_TAG: ${{ github.sha }}

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      # ----- Checkout Code -----
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----- Configure AWS Credentials -----
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ----- Login to Amazon ECR -----
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ----- Build Docker Image (with BuildKit cache) -----
      - name: Build Docker image
        run: |
          DOCKER_BUILDKIT=1 docker build \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            --cache-from ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest \
            -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} \
            -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest \
            .

      # ----- Push Docker Image to ECR -----
      - name: Push Docker image to ECR
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} &
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest &
          wait

      # ----- Update ECS Task Definition with New Image -----
      - name: Get current task definition
        id: get-task-def
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.ECR_REPOSITORY }} \
            --query 'taskDefinition' \
            --output json > task-def.json
          # Remove fields that cannot be included in register-task-definition
          jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' \
            task-def.json > clean-task-def.json

      - name: Update image in task definition
        run: |
          NEW_IMAGE="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}"
          jq --arg IMAGE "$NEW_IMAGE" \
            '.containerDefinitions[0].image = $IMAGE' \
            clean-task-def.json > updated-task-def.json

      - name: Register new task definition
        id: register-task-def
        run: |
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://updated-task-def.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          echo "task_def_arn=$TASK_DEF_ARN" >> $GITHUB_OUTPUT
          echo "Registered task definition: $TASK_DEF_ARN"

      # ----- Deploy to ECS Fargate -----
      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --task-definition ${{ steps.register-task-def.outputs.task_def_arn }} \
            --force-new-deployment \
            --desired-count 1

      - name: Wait for ECS deployment to stabilize
        run: |
          echo "Waiting for ECS service to stabilize (timeout: 2 minutes)..."
          timeout 120 aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            || echo "Warning: Service did not stabilize within timeout. Check ECS console."

      # ----- Upsert SageMaker Pipeline -----
      - name: Install Python dependencies for pipeline upsert
        run: |
          pip install --quiet boto3 "sagemaker>=2.0,<3.0"

      - name: Upsert SageMaker Pipeline
        env:
          S3_BUCKET: tabular-ml-platform-data-${{ secrets.AWS_ACCOUNT_ID }}
          SAGEMAKER_ROLE_ARN: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/tabular-ml-platform-sagemaker-role
          MODEL_PACKAGE_GROUP: tabular-ml-platform-models
          PIPELINE_NAME: ${{ env.PIPELINE_NAME }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: |
          cd pipeline
          python pipeline.py --upsert
          echo "SageMaker Pipeline upserted successfully."

      # ----- Deployment Summary -----
      - name: Print deployment summary
        run: |
          echo "============================================="
          echo " Deployment Summary"
          echo "============================================="
          echo "Image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}"
          echo "ECS Cluster: ${{ env.ECS_CLUSTER }}"
          echo "ECS Service: ${{ env.ECS_SERVICE }}"
          echo "Pipeline: ${{ env.PIPELINE_NAME }}"
          echo "Region: ${{ secrets.AWS_REGION }}"
          echo "============================================="
          echo ""
          echo "To find the application URL, run:"
          echo "  TASK_ARN=\$(aws ecs list-tasks --cluster ${{ env.ECS_CLUSTER }} --service ${{ env.ECS_SERVICE }} --region ${{ secrets.AWS_REGION }} --query 'taskArns[0]' --output text)"
          echo "  ENI_ID=\$(aws ecs describe-tasks --cluster ${{ env.ECS_CLUSTER }} --tasks \$TASK_ARN --region ${{ secrets.AWS_REGION }} --query 'tasks[0].attachments[0].details[?name==\`networkInterfaceId\`].value' --output text)"
          echo "  aws ec2 describe-network-interfaces --network-interface-ids \$ENI_ID --region ${{ secrets.AWS_REGION }} --query 'NetworkInterfaces[0].Association.PublicIp' --output text"
